<style>

body{
    background-color:#141414;
    font-family:'Segoe UI', sans-serif;
    margin:0;
    padding:0;
    color:white;
}

/* NAVBAR */
.navbar{
    background: linear-gradient(90deg,#e10600,#000000) !important;
    box-shadow:0 0 20px rgba(255,0,0,0.4);
}

.navbar-brand{
    font-weight:bold;
    font-size:1.4rem;
    color:#ffcc00 !important;
    display:flex;
    align-items:center;
}

.navbar-brand img{
    height:55px;
    margin-right:12px;
    transition:0.3s;
}

.navbar-brand img:hover{
    transform:scale(1.1);
}

.nav-link{
    color:white !important;
    margin:0 12px;
    font-weight:500;
}

.nav-link:hover{
    color:#ffcc00 !important;
}

/* SECCIÓN TIPO TICKETMASTER */
.tour-section{
    padding:140px 10%;
    background:#111;
}

.tour-section h2{
    text-align:center;
    color:#ffcc00;
    margin-bottom:60px;
    font-size:2.5rem;
}

.ticket-card{
    background:#1f1f1f;
    border-left:8px solid #ff2e2e;
    padding:30px;
    margin-bottom:25px;
    border-radius:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    transition:0.3s;
}

.ticket-card:hover{
    transform:scale(1.02);
    box-shadow:0 0 25px rgba(255,0,0,0.5);
}

.ticket-date{
    font-size:1.5rem;
    font-weight:bold;
    color:#ffcc00;
    min-width:150px;
}

.ticket-info{
    flex-grow:1;
    margin-left:30px;
}

.ticket-info h4{
    margin:0;
    font-weight:bold;
}

.ticket-info p{
    margin:5px 0 0 0;
    opacity:0.8;
}

.ticket-btn{
    background:#ff2e2e;
    border:none;
    padding:12px 30px;
    border-radius:8px;
    color:white;
    font-weight:bold;
    text-decoration:none;
    transition:0.3s;
}

.ticket-btn:hover{
    background:#e10600;
}

/* FOOTER */
footer{
    background:#000;
    text-align:center;
    padding:30px;
    color:#ffcc00;
    margin-top:60px;
}

</style>
